name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: joeai
          POSTGRES_PASSWORD: joeai
          POSTGRES_DB: joeai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U joeai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://joeai:joeai@localhost:5432/joeai
      REDIS_URL: redis://localhost:6379
      LINE_CHANNEL_SECRET: test-secret
      LINE_CHANNEL_ACCESS_TOKEN: test-token
      AUTH_SECRET: test-auth-secret-must-be-at-least-16-chars
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
